<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Response</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0b0c0f;color:#f0f1f3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#13151a;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:44px 36px;text-align:center;max-width:420px;width:100%;animation:up .4s ease}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.icon{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px}
.icon-yes{background:rgba(37,211,102,.1);border:2px solid rgba(37,211,102,.35)}
.icon-no{background:rgba(255,87,87,.08);border:2px solid rgba(255,87,87,.3)}
.icon-q{background:rgba(74,158,255,.1);border:2px solid rgba(74,158,255,.3)}
h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:10px}
p{font-size:14px;color:#7a7f8e;line-height:1.7;margin-bottom:0}
.btn-row{display:flex;gap:12px;justify-content:center;margin-top:28px}
.btn{padding:14px 32px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .2s;flex:1;max-width:160px}
.btn-yes{background:#25D366;color:#000}
.btn-yes:hover{background:#1fbc58}
.btn-no{background:rgba(255,87,87,.12);color:#ff5757;border:1px solid rgba(255,87,87,.3)}
.btn-no:hover{background:rgba(255,87,87,.2)}
.footer{margin-top:28px;font-size:11px;color:#2c2f38;border-top:1px solid rgba(255,255,255,.05);padding-top:16px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.08);border-top-color:#25D366;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <p style="color:#7a7f8e;font-size:14px">Loading...</p>
</div>
<script>
const SK = 'hirereach_v2';

function loadCampaigns(){
  try{ return JSON.parse(localStorage.getItem(SK)||'[]'); }catch{ return []; }
}
function saveCampaigns(a){
  localStorage.setItem(SK, JSON.stringify(a));
}

function getParams(){
  // Try URL search params first (?c=...&ct=...&t=...)
  const sp = new URLSearchParams(window.location.search);
  if(sp.get('c')) return { c: sp.get('c'), ct: sp.get('ct'), t: sp.get('t') };
  // Try hash (#?c=...&ct=...&t=...)
  const hash = window.location.hash.replace('#','').replace('?','');
  const hp = new URLSearchParams(hash);
  if(hp.get('c')) return { c: hp.get('c'), ct: hp.get('ct'), t: hp.get('t') };
  return null;
}

function showConfirm(name, type, already){
  const card = document.getElementById('card');
  const isYes = type === 'yes';
  card.innerHTML = `
    <div class="icon ${isYes?'icon-yes':'icon-no'}">${isYes?'✓':'✕'}</div>
    <h1>${already ? 'Already recorded!' : (isYes ? "Great, you're in!" : "Got it!")}</h1>
    <p>${already
      ? `Hi ${name}, your response was already saved.`
      : (isYes
        ? `Thanks ${name}! Your interest has been recorded. We'll be in touch soon.`
        : `Thanks ${name}! We've noted you're not interested right now. No worries!`)
    }</p>
    <div class="footer">Powered by HireReach</div>`;
}

function showQuestion(name){
  const card = document.getElementById('card');
  card.innerHTML = `
    <div class="icon icon-q">👋</div>
    <h1>Hi ${name}!</h1>
    <p>Are you interested in this opportunity?</p>
    <div class="btn-row">
      <button class="btn btn-yes" onclick="submitResponse('yes')">YES, interested</button>
      <button class="btn btn-no" onclick="submitResponse('no')">NO, thanks</button>
    </div>
    <div class="footer">Powered by HireReach</div>`;
}

function showError(){
  document.getElementById('card').innerHTML = `
    <div class="icon icon-no">!</div>
    <h1>Invalid link</h1>
    <p>This response link appears to be invalid or has expired.</p>
    <div class="footer">Powered by HireReach</div>`;
}

let _params = null;

function submitResponse(type){
  if(!_params) return;
  recordAndShow(_params.c, _params.ct, type);
}

function recordAndShow(cId, ctId, type){
  const all = loadCampaigns();
  const campIdx = all.findIndex(x => x.id === cId);

  // If campaign not found in this browser's localStorage — just show confirmation
  // (The recruiter will see it when they open the app)
  if(campIdx === -1){
    showConfirm('there', type, false);
    // Also post to a shared key so recruiter can pick it up
    saveRemoteResponse(cId, ctId, type);
    return;
  }

  const camp = all[campIdx];
  const ctIdx = camp.contacts.findIndex(x => x.id === ctId);
  const ctName = ctIdx > -1 ? camp.contacts[ctIdx].name : 'there';

  if(ctIdx > -1 && camp.contacts[ctIdx].response !== 'pending'){
    showConfirm(ctName, camp.contacts[ctIdx].response, true);
    return;
  }

  if(ctIdx > -1) camp.contacts[ctIdx].response = type;
  if(!camp.responses) camp.responses = [];
  camp.responses.push({
    contactId: ctId,
    name: ctName,
    phone: ctIdx > -1 ? camp.contacts[ctIdx].phone : '',
    type, source: 'link',
    time: new Date().toISOString()
  });
  if(type === 'yes') camp.yesCount = (camp.yesCount||0)+1;
  else camp.noCount = (camp.noCount||0)+1;
  all[campIdx] = camp;
  saveCampaigns(all);
  showConfirm(ctName, type, false);
}

// Cross-browser: save pending responses to a separate key
// When recruiter opens the app it will pick these up
function saveRemoteResponse(cId, ctId, type){
  try{
    const pending = JSON.parse(localStorage.getItem('hirereach_pending')||'[]');
    pending.push({ cId, ctId, type, time: new Date().toISOString() });
    localStorage.setItem('hirereach_pending', JSON.stringify(pending));
  }catch(e){}
}

// Init
window.addEventListener('DOMContentLoaded', function(){
  _params = getParams();
  if(!_params || !_params.c || !_params.ct){
    showError();
    return;
  }

  const type = _params.t; // 'yes', 'no', or null (ask them)

  // If type is provided in URL, record directly
  if(type === 'yes' || type === 'no'){
    recordAndShow(_params.c, _params.ct, type);
  } else {
    // No type in URL — show YES/NO buttons
    const all = loadCampaigns();
    const camp = all.find(x => x.id === _params.c);
    const ct = camp?.contacts?.find(x => x.id === _params.ct);
    showQuestion(ct?.name?.split(' ')[0] || 'there');
  }
});
</script>
</body>
</html>
